services:

  backend:
    image: 948075159533.dkr.ecr.ap-south-1.amazonaws.com/telemetry-backend:latest

    env_file:
      - .env
      
    container_name: telemetry_backend
    ports:
      - "5000:5000"

    volumes:
      - ./logs:/app/logs
  
  simulator:
    build: .
    container_name: telemetry_simulator

    environment:
      - BACKEND_URL=http://backend:5000/telemetry
      
    command: python3 simulator/vehicle_simulator.py
    depends_on:
      - backend

  database:
    image: postgres:15
    container_name: telemetry_database

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telemetry

    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus
    container_name: telemetry_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml

    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: telemetry_grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

  nginx:
    image: nginx:latest

    container_name: telemetry_nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf  

    depends_on:
      - backend