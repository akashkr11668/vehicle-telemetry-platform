name: Vehicle Telemetry CI

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: telemetry-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t vehicle-telemetry-backend .

      - name: Tag Docker Image
        run: |
          docker tag vehicle-telemetry-backend:latest \
          948075159533.dkr.ecr.ap-south-1.amazonaws.com/telemetry-backend:latest

      - name: Push Docker Image
        run: |
          docker push \
          948075159533.dkr.ecr.ap-south-1.amazonaws.com/telemetry-backend:latest
